about:
  eyebrow: "О компании"
  title: "Экспортёр, который строит партнёрства вдолгую"
  text: "VEGEX — кыргызская экспортная компания, специализирующаяся на поставках свежего премиального чеснока, выращенного в высокогорных районах Кыргызстана. Поставляем тщательно отобранный чеснок экспортного качества оптовым компаниям, дистрибьюторам, перерабатывающим предприятиям и торговым сетям на международных рынках."
  mission: "Наша цель — построение долгосрочных партнёрских отношений за счёт стабильного качества продукции, прозрачного взаимодействия и надёжной экспортной логистики."

terroir:
  eyebrow: "Природные преимущества"
  title: "Почему чеснок из Кыргызстана"
  intro: "Наш чеснок выращивается в горных районах на большой высоте над уровнем моря, где уникальные природные условия способствуют формированию продукции высокого качества."
  cards:
    - { title: "Высокогорное выращивание", text: "Плантации выше 1800 м — медленное, естественное вызревание." }
    - { title: "Большая разница между дневными и ночными температурами", text: "Концентрирует вкус и плотность головки." }
    - { title: "Плодородные почвы", text: "Богатый горный грунт даёт ресурс для крупного калибра." }
    - { title: "Чистая горная экосистема", text: "Удалённые районы без техногенной нагрузки." }
    - { title: "Горная вода, богатая природными минералами", text: "Полив чистой водой из ледников и рек." }
    - { title: "Традиционные методы выращивания", text: "Проверенные приёмы и тщательная ручная сортировка." }
  note: "Благодаря этим условиям формируются плотные, крупные и хорошо вызревшие головки чеснока с отличным товарным видом и высокой лёжкостью. Уникальные природные условия выращивания позволяют предполагать высокий природный потенциал содержания аллицина. По запросу покупателя лабораторный анализ содержания аллицина может быть выполнен в аккредитованных лабораториях Германии или Дубая."

