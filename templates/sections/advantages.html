<!-- ADV -->
<section>
<div class="wrap">
  <div class="sec-head rv">
    <span class="eyebrow">{{ advantages.eyebrow }}</span>
    <h2>{{ advantages.title }}</h2>
    <div class="grad-line"></div>
  </div>
  <div class="adv-g rv">
    {% for a in advantages['items'] %}
    <div class="adv"><div class="n">{{ "%02d"|format(loop.index) }}</div><h3>{{ a.title }}</h3><p>{{ a.text }}</p></div>
    {% endfor %}
  </div>
</div>
</section>
