<!-- PARTNERS -->
<section>
<div class="wrap">
  <div class="sec-head rv">
    <span class="eyebrow">{{ partners.eyebrow }}</span>
    <h2>{{ partners.title }}</h2>
    <div class="grad-line"></div>
    <p>{{ partners.intro }}</p>
  </div>
  <div class="partners-grid rv">
    {% for c in partners.countries %}
    <div class="partner-c"><div class="partner-flag">{{ c.flag }}</div><b>{{ c.name }}</b></div>
    {% endfor %}
  </div>
</div>
</section>
