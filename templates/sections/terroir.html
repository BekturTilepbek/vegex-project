<!-- TERROIR -->
{% set terroir_icons = [
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 10a3 3 0 016 0" /><path d="M3 20l4-7 4 7z"/><path d="M13 20l4-7 4 7z"/><circle cx="17" cy="6" r="2.2"/></svg>',
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 17a5 5 0 0110 0"/><circle cx="18" cy="6" r="2"/><path d="M11 4v-1M11 20v1"/></svg>',
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2C9 6 8 8 8 11a4 4 0 008 0c0-3-1-5-4-9z"/><path d="M6 20h12"/></svg>',
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19c4-6 12-6 16 0"/><path d="M4 15c3-4 9-4 12 0"/></svg>',
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 20h18L14 7l-3 5-2-3z"/><path d="M5 17c1-1 2-1 3 0s2 1 3 0 2-1 3 0"/></svg>',
  '<svg class="tc-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 21V10l8-6 8 6v11"/><path d="M9 21v-6h6v6"/></svg>'
] %}
<section id="terroir">
<div class="wrap">
  <div class="sec-head rv">
    <span class="eyebrow">{{ terroir.eyebrow }}</span>
    <h2>{{ terroir.title }}</h2>
    <div class="grad-line"></div>
    <p>{{ terroir.intro }}</p>
  </div>
  <div class="tgrid rv">
    {% for c in terroir.cards %}
    <div class="tc"><span class="n">{{ "%02d"|format(loop.index) }}</span>
      {{ terroir_icons[loop.index0] | safe }}
      <h3>{{ c.title }}</h3><p>{{ c.text }}</p></div>
    {% endfor %}
  </div>
  <p style="margin-top:36px;font-size:14px;color:var(--stone);max-width:760px;line-height:1.6" class="rv">{{ terroir.note }}</p>
</div>
</section>
